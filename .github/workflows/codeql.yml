name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v7

      # CodeQL does not support PHP; this scans the front-end JS only.
      # PHP-side coverage instead comes from `composer audit` in ci.yml.
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/analyze@v4

name: PWA Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: |
          npm ci
      - name: Build assets (generate icons + build)
        run: |
          npm ci
          npm run build:assets
      - name: Verify icons exist
        run: |
          test -f public/build/icons/icon-192.png && test -f public/build/icons/icon-512.png && test -f public/build/icons/apple-touch-icon.png
